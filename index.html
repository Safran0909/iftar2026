<!DOCTYPE html>
<html>
<head>
<title>Iftar Meet Registration</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init("vYRMUiaEOCkjAGqGj");
</script>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#15122a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* container */

.container{
background:white;
padding:40px;
border-radius:12px;
max-width:360px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* logo */

.logo{
width:180px;
max-width:80%;
margin-bottom:10px;
}

/* text */

.subtitle{
color:#777;
margin-bottom:20px;
font-size:15px;
}

.price{
font-weight:bold;
margin-bottom:20px;
font-size:16px;
}

/* inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
}

input:focus{
outline:none;
border-color:#000;
}

/* button */

button{
width:100%;
padding:14px;
background:#000;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#333;
}

/* mobile adjustments */

@media (max-width:480px){

.container{
padding:25px;
}

.subtitle{
font-size:14px;
}

.price{
font-size:15px;
}

input{
font-size:16px;
}

button{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="yes.png" class="logo">

<div class="subtitle">Reserve your seat for the event</div>

<div class="price">Ticket: ₹350</div>

<input id="name" placeholder="Full Name" required>
<input id="email" type="email" placeholder="Email Address" required>
<input id="phone" type="tel" placeholder="Phone Number (10 digits)" required>

<button onclick="payNow()">Register & Pay</button>

</div>

<script>

async function payNow(){

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();
const phone = document.getElementById("phone").value.trim();

/* Validation */

if(!name){
alert("Please enter your name");
return;
}

const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){
alert("Enter a valid email address");
return;
}

const phoneRegex=/^[0-9]{10}$/;

if(!phoneRegex.test(phone)){
alert("Phone number must be 10 digits");
return;
}

/* Create order */

const res = await fetch("/create-order",{method:"POST"});
const order = await res.json();

/* Razorpay */

var options = {

key:"rzp_live_SQduemo1jFIx6m",

amount:order.amount,
currency:"INR",
order_id:order.id,

name:"Iftar Meet Ticket",
description:"Event Entry Ticket",

handler: async function () {

try{

const response = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
email:email,
phone:phone
})
});

if(!response.ok){
throw new Error("Registration failed");
}

const data = await response.json();

/* Send Email */

await emailjs.send(
"service_5lzf9xi",
"template_aw6i209",
{
name:name,
email:email,
phone:phone,
ticket:data.ticket
}
);

/* Save ticket */

localStorage.setItem("name",name);
localStorage.setItem("email",email);
localStorage.setItem("phone",phone);
localStorage.setItem("ticket",data.ticket);

/* Redirect */

window.location.href="ticket.html";

}catch(err){

console.error(err);
alert("Something went wrong while generating your ticket");

}

}

};

var rzp=new Razorpay(options);
rzp.open();

}

</script>

</body>
</html>
