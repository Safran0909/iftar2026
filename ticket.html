<!DOCTYPE html>
<html>
<head>
<title>Your Event Ticket</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* viewport background */

html{
height:100%;
background:linear-gradient(135deg,#000000,#15122a);
overscroll-behavior:none;
}

/* body */

body{
margin:0;
min-height:100vh;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#000000,#15122a);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overscroll-behavior:none;
}

/* ticket */

.ticket{
background:white;
padding:35px;
width:360px;
max-width:100%;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
text-align:center;
position:relative;
}

/* logo */

.logo{
width:200px;
max-width:80%;
margin-bottom:10px;
}

/* subtitle */

.event-sub{
color:#777;
font-size:14px;
margin-bottom:25px;
}

/* sections */

.section{
text-align:left;
margin-bottom:15px;
}

.label{
color:#888;
font-size:11px;
letter-spacing:1px;
margin-bottom:3px;
}

.value{
font-size:16px;
font-weight:500;
word-break:break-word;
}

/* ticket code */

.ticket-code{
font-size:24px;
font-weight:bold;
color:#000;
margin-top:5px;
}

/* divider */

.divider{
height:1px;
background:#eee;
margin:20px 0;
}

/* qr */

.qr{
display:flex;
justify-content:center;
margin-top:10px;
}

/* note */

.note{
margin-top:15px;
font-size:12px;
color:#777;
}

/* mobile improvements */

@media (max-width:480px){

.ticket{
padding:25px;
}

.value{
font-size:15px;
}

.ticket-code{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="ticket">

<div class="event-title">
<img src="yes.png" class="logo">
</div>

<div class="event-sub">Entry Pass</div>

<div class="section">
<div class="label">ATTENDEE</div>
<div class="value" id="name"></div>
</div>

<div class="section">
<div class="label">EMAIL</div>
<div class="value" id="email"></div>
</div>

<div class="section">
<div class="label">PHONE</div>
<div class="value" id="phone"></div>
</div>

<div class="divider"></div>

<div class="section">
<div class="label">TICKET CODE</div>
<div class="ticket-code" id="ticket"></div>
</div>

<div class="qr" id="qrcode"></div>

<div class="note">
Show this QR code at the event entrance
</div>

</div>

<script>

const name = localStorage.getItem("name");
const email = localStorage.getItem("email");
const phone = localStorage.getItem("phone");
const ticket = localStorage.getItem("ticket");

document.getElementById("name").innerText = name || "";
document.getElementById("email").innerText = email || "";
document.getElementById("phone").innerText = phone || "";
document.getElementById("ticket").innerText = ticket || "";

/* QR generation */

new QRCode(document.getElementById("qrcode"),{
text: ticket,
width:150,
height:150
});

</script>

</body>
</html>
