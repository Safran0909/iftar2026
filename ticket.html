<!DOCTYPE html>

<html><head>
<meta charset="utf-8"/>
<title>Your Event Ticket</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#0a0e17" name="theme-color"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
html{
height:100%;
background-color:#0a0e17;
}

/* body */

body{
margin:0;
min-height:100vh;
font-family:'Inter', sans-serif;
background-color: var(--bg-dark);
background-image: 
                radial-gradient(at 0% 0%, hsla(215,98%,61%,0.04) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(45,89%,58%,0.03) 0px, transparent 50%);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overscroll-behavior:none;
color:#f1f5f9;
}

/* ticket card */

.ticket{
background:rgba(20, 27, 41, 0.8);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
padding:35px;

width:500px;
max-width:500px;

border-radius:16px;

border:1px solid #1e293b;

box-shadow:0 15px 35px rgba(0,0,0,0.5);

text-align:center;
position:relative;

box-sizing:border-box;
}

/* logo */

.logo{
width:200px;
max-width:80%;
margin-bottom:10px;
}

/* subtitle */

.event-sub{
color:#dfb52a;
font-size:14px;
margin-bottom:25px;
}

/* sections */

.section{
text-align:left;
margin-bottom:15px;
}

/* label */

.label{
color:#dfb52a;
font-size:11px;
font-weight:600;
text-transform:uppercase;
letter-spacing:1.5px;
margin-bottom:2px;
opacity: 0.9;
}

/* value */

.value{
font-size:16px;
font-weight:500;
word-break:break-word;
margin-bottom:6px;
}

/* ticket code */

.ticket-code{
font-family:'Playfair Display', serif;
font-size:24px;
font-weight:bold;
color:#f1f5f9;
margin-top:5px;
}

/* divider */

.divider{
height:1px;
background:#1e293b;
margin:20px 0;
}

/* qr */
.qr-wrapper{
background:#ffffff;
padding:15px;
border-radius:12px;
display:inline-block;
margin-top:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.qr{
display:flex;
justify-content:center;
}

/* note */

.note{
margin-top:15px;
font-size:12px;
color:#94a3b8;
}

/* mobile */

@media (max-width:480px){

.ticket{
padding:25px;
}

.value{
font-size:15px;
}

.ticket-code{
font-size:22px;
}

}
</style>
</head>
<body>
<div class="ticket">
<div class="event-title">
    <img src="new.png" class="logo" style="max-width: 240px; width: 100%; height: auto; margin: 0 auto 24px; display: block;"/><div class="event-tagline"></div>
</div>
<div class="event-sub" style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 32px";>Digital Entry Pass</div>
<div class="section">
<div class="label">ATTENDEE</div>
<div class="value" id="name">Loading...</div>
</div>
<div class="section">
<div class="label">EMAIL ADDRESS</div>
<div class="value" id="email">Loading...</div>
</div>
<div class="section">
<div class="label">PHONE</div>
<div class="value" id="phone">Loading...</div>
</div>
<div class="divider"></div>
<div class="section">
<div class="label">TICKET CODE</div>
<div class="ticket-code" id="ticket">---</div>
</div>
<div class="qr-wrapper">
<div class="qr" id="qrcode"></div>
</div>
<div class="note">
        Please present this digital pass at the entrance.<br/>
        Traditional evening • April 5th, 6:30 PM
    </div>
</div>
<script>
    const name = localStorage.getItem("name");
    const email = localStorage.getItem("email");
    const phone = localStorage.getItem("phone");
    const ticket = localStorage.getItem("ticket");

    document.getElementById("name").innerText = name || "Guest User";
    document.getElementById("email").innerText = email || "Not provided";
    document.getElementById("phone").innerText = phone || "Not provided";
    document.getElementById("ticket").innerText = ticket || "PENDING";

    /* QR generation */
    const qrData = ticket || "INVALID_TICKET";
    
    new QRCode(document.getElementById("qrcode"), {
        text: qrData,
        width: 160,
        height: 160,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
</script>
</body></html>
