<!DOCTYPE html>
<html>
<head>
<title>Iftar Meet Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#15122a);
color:white;
text-align:center;
}

.header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
background:#111;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Dashboard */

.stats{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.box{
background:#1a1a1a;
padding:12px;
border-radius:8px;
width:30%;
}

.num{
font-size:22px;
font-weight:bold;
}

.label{
font-size:12px;
color:#bbb;
}

/* Scanner */

#reader{
width:100%;
margin-top:10px;
}

/* Result */

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
padding:15px;
border-radius:8px;
display:none;
}

.valid{
background:#28a745;
}

.used{
background:#dc3545;
}

.invalid{
background:#ffc107;
color:black;
}

button{
margin-top:15px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#fff;
color:#000;
}

button:hover{
background:#ddd;
}

</style>

</head>

<body>

<div class="header">
Iftar Meet Scanner
</div>

<div class="container">

<!-- Dashboard -->

<div class="stats">

<div class="box">
<div class="num" id="total">0</div>
<div class="label">Total</div>
</div>

<div class="box">
<div class="num" id="checked">0</div>
<div class="label">Checked</div>
</div>

<div class="box">
<div class="num" id="remaining">0</div>
<div class="label">Remaining</div>
</div>

</div>

<!-- Scanner -->

<div id="reader"></div>

<div id="result"></div>

<button onclick="restartScanner()" id="scanAgain" style="display:none;">
Scan Next Ticket
</button>

</div>

<script>

let scanner;

/* -------------------------
   Load Dashboard Stats
------------------------- */

function loadStats(){

fetch("/stats")
.then(res=>res.json())
.then(data=>{

document.getElementById("total").innerText=data.total;
document.getElementById("checked").innerText=data.checked;
document.getElementById("remaining").innerText=data.remaining;

});

}

loadStats();
setInterval(loadStats,5000);

/* -------------------------
   QR Scan Success
------------------------- */

function onScanSuccess(decodedText){

scanner.clear();

fetch("/checkin",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ticket:decodedText})
})
.then(res=>res.text())
.then(data=>{

const resultBox=document.getElementById("result");

resultBox.style.display="block";

/* GREEN */

if(data.includes("Welcome")){

resultBox.className="valid";
resultBox.innerText=data;

/* RED */

}else if(data.includes("Already")){

resultBox.className="used";
resultBox.innerText=data;

/* YELLOW */

}else{

resultBox.className="invalid";
resultBox.innerText=data;

}

document.getElementById("scanAgain").style.display="inline-block";

loadStats();

});

}

/* -------------------------
   Start Scanner
------------------------- */

function startScanner(){

scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

}

/* -------------------------
   Restart Scanner
------------------------- */

function restartScanner(){

document.getElementById("result").style.display="none";
document.getElementById("scanAgain").style.display="none";

startScanner();

}

startScanner();

</script>

</body>
</html>
