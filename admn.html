<!DOCTYPE html>
<html>
<head>
<title>Iftar Meet Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html{
height:100%;
background:linear-gradient(135deg,#000,#15122a);
overscroll-behavior:none;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000,#15122a);
color:white;
min-height:100vh;
padding:20px;
box-sizing:border-box;
}

h1{
text-align:center;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.box{
background:#1a1a1a;
padding:14px 20px;
border-radius:10px;
text-align:center;
min-width:100px;
}

.num{
font-size:22px;
font-weight:bold;
}

.label{
font-size:12px;
color:#bbb;
}

.search{
max-width:450px;
margin:auto;
margin-bottom:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:15px;
}

.sort{
text-align:center;
margin-bottom:15px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin:4px;
font-size:14px;
}

.asc{ background:#28a745; color:white; }
.desc{ background:#007bff; color:white; }
.toggle{ background:#ff9800; color:black; }

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid #222;
font-size:14px;
}

th{
background:#1b1b1b;
}

.checked{
color:#28a745;
font-weight:bold;
}

.notchecked{
color:#ffc107;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Iftar Meet Admin</h1>

<div class="stats">
<div class="box">
<div class="num" id="total">0</div>
<div class="label">Total</div>
</div>

<div class="box">
<div class="num" id="checked">0</div>
<div class="label">Checked</div>
</div>

<div class="box">
<div class="num" id="remaining">0</div>
<div class="label">Not Scanned</div>
</div>
</div>

<div class="search">
<input id="search" placeholder="Search name, email, phone or ticket">
</div>

<div class="sort">
<button class="asc" onclick="sortAsc()">Oldest</button>
<button class="desc" onclick="sortDesc()">Newest</button>
<button class="toggle" onclick="toggleStatusSort()" id="toggleBtn">Show Checked First</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Ticket</th>
<th>Status</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>

let attendees=[];
let checkedFirst=true;

/* Load stats */

async function loadStats(){
const res=await fetch("/stats");
const data=await res.json();

document.getElementById("total").innerText=data.total;
document.getElementById("checked").innerText=data.checked;
document.getElementById("remaining").innerText=data.remaining;
}

/* Load attendees once */

async function loadAttendees(){
const res=await fetch("/attendees");
attendees=await res.json();

attendees.sort((a,b)=>a.id-b.id);
renderTable(attendees);
}

/* Render */

function renderTable(data){
const table=document.getElementById("list");
table.innerHTML="";

data.forEach((person,index)=>{

const status=person.checked_in
? '<span class="checked">Checked</span>'
: '<span class="notchecked">Not Scanned</span>';

table.innerHTML+=`
<tr>
<td>${index+1}</td>
<td>${person.name}</td>
<td>${person.email}</td>
<td>${person.phone}</td>
<td>${person.ticket_code}</td>
<td>${status}</td>
</tr>
`;
});
}

/* Search */

document.getElementById("search").addEventListener("input",function(){
const q=this.value.toLowerCase();

const filtered=attendees.filter(p=>
p.name.toLowerCase().includes(q) ||
p.email.toLowerCase().includes(q) ||
p.phone.includes(q) ||
p.ticket_code.toLowerCase().includes(q)
);

renderTable(filtered);
});

/* Sort basic */

function sortAsc(){
attendees.sort((a,b)=>a.id-b.id);
renderTable(attendees);
}

function sortDesc(){
attendees.sort((a,b)=>b.id-a.id);
renderTable(attendees);
}

/* ⭐ Toggle sort */

function toggleStatusSort(){

if(checkedFirst){

attendees.sort((a,b)=>{
if(a.checked_in===b.checked_in) return 0;
return a.checked_in ? -1 : 1;
});

document.getElementById("toggleBtn").innerText="Show Not Checked First";
checkedFirst=false;

}else{

attendees.sort((a,b)=>{
if(a.checked_in===b.checked_in) return 0;
return a.checked_in ? 1 : -1;
});

document.getElementById("toggleBtn").innerText="Show Checked First";
checkedFirst=true;

}

renderTable(attendees);

}

/* Initial load */

loadStats();
loadAttendees();

/* Only stats refresh */

setInterval(loadStats,5000);

</script>

</body>
</html>
